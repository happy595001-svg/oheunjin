<!DOCTYPE html>
<html>

<head>

    <title>현대차 협력사 취업 플랫폼</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="d-flex">

    <!-- 사이드바 -->

    <div class="sidebar p-4">

        <h3 class="text-white mb-5">
            HYUNDAI JOB
        </h3>

        <a href="/">홈</a>

        <a href="#">기업정보</a>

        <a href="#">채용공고</a>

        <a href="#">산업뉴스</a>

        <a href="#">면접준비</a>

    </div>


    <!-- 메인 -->

    <div class="flex-grow-1 p-5">

        <!-- 제목 -->

        <h2 class="fw-bold mb-4">

            현대자동차 및 협력사 취업 플랫폼

        </h2>


        <!-- 검색창 -->

        <form class="d-flex mb-4">

            <input
            type="text"
            class="form-control me-2"
            placeholder="직무, 산업 키워드, 기업 이슈를 검색하세요">

            <button
            class="btn btn-primary">

                검색

            </button>

        </form>


        <!-- 기업 버튼 -->

        <div class="mb-5">

            {% for company in companies %}

            <a
            href="/company/{{ company }}"
            class="btn btn-light rounded-pill me-2 mb-2">

                {{ company }}

            </a>

            {% endfor %}

        </div>


        <!-- 뉴스 카드 -->

        <div class="row">

            {% for item in news %}

            <div class="col-lg-4 mb-4">

                <div class="card news-card h-100">

                    <img
                    src="{{ item.image }}"
                    class="card-img-top">

                    <div class="card-body">

                        <div class="text-primary small mb-2">

                            자동차 산업 뉴스

                        </div>

                        <h5 class="card-title">

                            {{ item.title | safe }}

                        </h5>

                        <p class="text-muted">

                            현대자동차 및 협력사 관련 최신 기사입니다.

                        </p>

                        <a
                        href="{{ item.link }}"
                        class="btn btn-primary">

                            기사 보기

                        </a>

                    </div>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</div>

</body>

</html>
