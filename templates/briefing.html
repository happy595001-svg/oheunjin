{% extends "base.html" %}

{% block title %}AI 브리핑{% endblock %}

{% block content %}
<section class="page-title">
  <span class="eyebrow">AI Briefing</span>
  <h1>AI 취업 브리핑</h1>
  <p>지원 기업과 직무를 기준으로 오늘 준비할 내용을 간단히 정리합니다.</p>
</section>

<section class="tool-grid">
  <article class="info-card highlight-card">
    <i class="bi bi-stars section-icon"></i>
    <h2>오늘의 브리핑</h2>
    <p>관심 기업의 최근 이슈를 확인하고, 자기소개서 문장 1개와 면접 답변 1개로 연결해보세요.</p>
  </article>

  <article class="info-card">
    <i class="bi bi-lightning-charge section-icon"></i>
    <h2>추천 준비 순서</h2>
    <ol class="clean-list numbered">
      <li>기업정보에서 산업과 주요 직무 확인</li>
      <li>산업뉴스에서 최신 이슈 확인</li>
      <li>면접준비에서 답변 구조 정리</li>
    </ol>
  </article>
</section>
{% endblock %}
